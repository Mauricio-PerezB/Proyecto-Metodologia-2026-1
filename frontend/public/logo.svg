<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo círculo azul oscuro -->
  <circle cx="200" cy="200" r="190" fill="#233758"/>
  
  <!-- Borde punteado blanco -->
  <circle cx="200" cy="200" r="170" stroke="white" stroke-width="6" stroke-dasharray="14 14" fill="none"/>
  
  <!-- Texto SURCENTRAL (más pequeño y centrado) -->
  <text x="190" y="105" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="20" letter-spacing="1" text-anchor="middle">SURCENTRAL</text>
  
  <!-- Círculo amarillo con checkmark (movido hacia arriba y derecha, más chico) -->
  <circle cx="300" cy="105" r="24" fill="#deb445"/>
  <path d="M 290,105 L 297,113 L 312,94" stroke="#233758" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Target (mira / manubrio) -->
  <!-- Anillo exterior -->
  <circle cx="200" cy="215" r="75" stroke="white" stroke-width="10" fill="none"/>
  
  <!-- Círculo interior amarillo -->
  <circle cx="200" cy="215" r="18" fill="#deb445"/>
  
  <!-- Líneas de la mira -->
  <line x1="200" y1="185" x2="200" y2="155" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <line x1="200" y1="245" x2="200" y2="275" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <line x1="170" y1="215" x2="140" y2="215" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <line x1="230" y1="215" x2="260" y2="215" stroke="white" stroke-width="10" stroke-linecap="round"/>
  
  <!-- Línea inferior amarilla punteada (camino amarillo) -->
  <line x1="100" y1="320" x2="300" y2="320" stroke="#deb445" stroke-width="10" stroke-linecap="round" stroke-dasharray="35 30"/>
</svg>
